<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Asset Management System</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --navbar-bg: #2c3e50;
            --accent-blue: #3498db;
            --accent-hover: #2980b9;
            --text-dark: #333333;
            --text-muted: #777777;
            --border-color: #d2d6de;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .register-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            box-sizing: border-box;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            border-top: 4px solid var(--navbar-bg);
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h2 {
            margin: 0 0 8px 0;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--navbar-bg);
        }

        .register-header p {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #555555;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }

        .register-btn {
            width: 100%;
            background-color: var(--navbar-bg);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .register-btn:hover {
            background-color: #1a252f;
        }

        .form-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .form-footer a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
            color: var(--accent-hover);
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-header">
        <h2>Create Account</h2>
        <p>Join the Asset Management Platform</p>
    </div>

    <form th:action="@{/register}" method="post">
        <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text"
                   id="fullname"
                   name="fullname"
                   placeholder="e.g., John Doe"
                   required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="name@company.com"
                   required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="••••••••"
                   required>
        </div>

        <button type="submit" class="register-btn">
            Register
        </button>
    </form>

    <form th:action="@{/admin/register}" method="post">

        <div class="form-footer">
            Changed your mind? <a th:href="@{/admin}">Return to Control Panel</a>
        </div>
</div>

</body>
</html>
